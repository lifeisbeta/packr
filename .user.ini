; PHP settings for DreamHost shared hosting
; This file is read by PHP-FPM — use this instead of .htaccess php_value directives

; Sessions
session.cookie_httponly = 1
session.cookie_samesite = Lax
session.use_strict_mode = 1

; Errors — turn off display on production
display_errors = Off
log_errors = On

; Upload / post limits
post_max_size = 8M
upload_max_filesize = 8M
